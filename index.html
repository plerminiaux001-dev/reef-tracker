<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>389 Reef Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1 id="appTitle">🐠 389 Reef Command Center</h1>

    <div class="tab-nav">
        <button class="tab-btn active" data-target="dashboard">Dashboard</button>
        <button class="tab-btn" data-target="lighting">Lighting Editor</button>
        <button class="tab-btn" data-target="instructions">Dosing Guide</button>
        <button class="tab-btn" data-target="mixing">Salt Mixer</button>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="card" style="margin-bottom: 25px;">
            <h2>Current Status</h2>
            <div class="status-grid" id="statusDisplay"></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>📝 Add New Log</h2>
                <div class="form-group"><label>Date</label><input type="date" id="date"></div>
                <div class="form-group"><label>Alk (dKH)</label><input type="number" step="0.1" id="alk"></div>
                <div class="form-group"><label>Ca (ppm)</label><input type="number" id="ca"></div>
                <div class="form-group"><label>Mg (ppm)</label><input type="number" id="mg"></div>
                <div class="form-group"><label>NO3 (ppm)</label><input type="number" step="0.1" id="no3"></div>
                <div class="form-group"><label>PO4 (ppm)</label><input type="number" step="0.01" id="po4"></div>
                <div class="form-group"><label>pH</label><input type="number" step="0.1" id="ph"></div>
                <button id="saveEntryBtn">Save Entry</button>
            </div>

            <div class="card highlight">
                <h2>🧪 Dosing Assistant</h2>
                <div style="background: rgba(6, 182, 212, 0.1); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(6, 182, 212, 0.2);">
                    <label style="color: var(--primary); font-size: 0.75em;">Current Blenny Settings (mL/day)</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                        <input type="number" id="currentP1" placeholder="P1 (Ca)" step="0.1">
                        <input type="number" id="currentP2" placeholder="P2 (Alk)" step="0.1">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group"><label>Current Ca</label><input type="number" id="calcCurrentCa"></div>
                    <div class="form-group"><label>Target Ca</label><input type="number" id="calcTargetCa" value="430"></div>
                </div>
                <button id="calcBtn">Calculate Adjustments</button>
                <div id="calc-results" style="display:none; margin-top: 15px;"></div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 15px;">📈 Trends</h2>
            <div class="chart-controls">
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="0" checked> Alk</label>
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="1" checked> Ca</label>
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="2" checked> Mg</label>
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="3" checked> NO3</label>
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="4" checked> PO4</label>
                <label class="chart-check-label"><input type="checkbox" class="param-check" data-idx="5" checked> pH</label>
            </div>
            <div class="chart-container">
                <canvas id="tankChart"></canvas>
            </div>
        </div>

        <div class="card" style="margin-top: 25px;">
            <h2>History</h2>
            <button id="refreshBtn" style="width: auto; float: right; padding: 8px 15px; margin-top:-40px;">↻ Sync</button>
            <table id="historyTable">
                <thead><tr><th>Date</th><th>Alk</th><th>Ca</th><th>Mg</th><th>NO3</th><th>PO4</th><th>pH</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="lighting" class="tab-content">
        <div class="card highlight"><h2>💡 Light Profile Generator</h2><p>Restored content.</p></div>
    </div>
    <div id="mixing" class="tab-content">
        <div class="card highlight">
            <h2>🌊 Saltwater Mixing Station</h2>
            <div class="grid">
                <div class="form-group"><label>Water Vol (Gal)</label><input type="number" id="mixVol" value="5"></div>
                <div class="form-group"><label>Target SG</label><input type="number" id="mixTarget" value="1.026" step="0.001"></div>
            </div>
            <button id="btnMix">Calculate Mix</button>
            <div id="mixResult" style="display:none; margin-top:20px;">
                <h3>🧂 Add to Water: <span id="resGrams">0</span>g (<span id="resCups">0</span> cups)</h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
